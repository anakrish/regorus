# Codebase audit using GitHub Models API.
# Discovers all relevant files for a topic, analyzes them with multiple
# perspectives, and posts findings as a GitHub Issue.
#
# Triggers:
# - Manual: pick a preset or enter a free-text topic
# - Scheduled: rotates through presets on a weekly cadence

name: Codebase Audit

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Audit topic (e.g., "error handling patterns", "FFI boundary safety")'
        required: false
        default: ''
        type: string
      perspectives:
        description: 'Comma-separated perspectives (or "auto" for topic-based selection)'
        required: false
        default: 'auto'
        type: string
      preset:
        description: 'Use a preset audit (overrides topic/perspectives if set)'
        required: false
        type: choice
        options:
          - '(none)'
          - 'panic-safety'
          - 'ffi-boundary'
          - 'security-hardening'
          - 'undefined-propagation'
          - 'resource-limits'
          - 'performance'
          - 'design-alternatives'
          - 'code-cleanup'
          - 'test-gaps'
          - 'api-ergonomics'

  # Weekly rotation: one preset per week, cycling through all 10.
  # GitHub week numbers mod 10 select which preset runs.
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8:00 UTC

concurrency:
  group: codebase-audit-${{ github.event.inputs.preset || 'scheduled' }}
  cancel-in-progress: false

permissions:
  models: read
  contents: read
  issues: write

jobs:
  codebase-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Resolve preset
        id: resolve
        run: |
          PRESET="${{ github.event.inputs.preset }}"
          TOPIC="${{ github.event.inputs.topic }}"
          PERSPECTIVES="${{ github.event.inputs.perspectives }}"

          # For scheduled runs, rotate through presets by week number
          if [ "${{ github.event_name }}" = "schedule" ]; then
            PRESETS=(
              panic-safety
              ffi-boundary
              security-hardening
              undefined-propagation
              resource-limits
              performance
              design-alternatives
              code-cleanup
              test-gaps
              api-ergonomics
            )
            WEEK=$(date +%V)
            INDEX=$((10#$WEEK % ${#PRESETS[@]}))
            PRESET="${PRESETS[$INDEX]}"
            echo "Scheduled run: week ${WEEK} → preset '${PRESET}'"
          fi

          # Resolve preset to topic + perspectives
          if [ "$PRESET" != "(none)" ] && [ -n "$PRESET" ]; then
            PRESET_FILE=".github/prompts/audit-${PRESET}.json"
            if [ -f "$PRESET_FILE" ]; then
              TOPIC=$(jq -r '.topic' "$PRESET_FILE")
              PERSPECTIVES=$(jq -r '.perspectives // "auto"' "$PRESET_FILE")
              echo "Using preset: ${PRESET} → topic='${TOPIC}'"
            else
              echo "::warning::Preset file not found: ${PRESET_FILE}"
            fi
          fi

          if [ -z "$TOPIC" ]; then
            echo "::error::No topic specified. Use a preset or enter a topic."
            exit 1
          fi

          echo "topic=${TOPIC}" >> "$GITHUB_OUTPUT"
          echo "perspectives=${PERSPECTIVES}" >> "$GITHUB_OUTPUT"

      - name: Run codebase audit
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x .github/scripts/codebase-audit.sh
          .github/scripts/codebase-audit.sh \
            "${{ github.repository }}" \
            "${{ steps.resolve.outputs.topic }}" \
            "${{ steps.resolve.outputs.perspectives }}"
