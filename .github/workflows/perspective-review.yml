# Multi-perspective AI code review using GitHub Models API.
# Posts a single consolidated review comment with perspective-tagged findings.
# Review logic lives in .github/scripts/perspective-review.sh

name: Perspective Review

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true

concurrency:
  group: perspective-review-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  perspective-review:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!github.event.pull_request.draft &&
      github.event.pull_request.user.login != 'dependabot[bot]')

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run perspective review
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          chmod +x .github/scripts/perspective-review.sh
          .github/scripts/perspective-review.sh "${{ github.repository }}" "$PR_NUMBER"

