# E2E Test: Monitoring/ActivityLog_CaptureAllRegions
# Features: AuditIfNotExists for subscription-scope related log profile

policy_definition: |
  {
    "properties": {
      "displayName": "Azure Monitor should collect activity logs from all regions",
      "policyType": "BuiltIn",
      "mode": "All",
      "parameters": {
        "effect": {
          "type": "string",
          "defaultValue": "AuditIfNotExists",
          "allowedValues": ["AuditIfNotExists", "Disabled"]
        }
      },
      "policyRule": {
        "if": {
          "field": "type",
          "equals": "Microsoft.Resources/subscriptions"
        },
        "then": {
          "effect": "[parameters('effect')]",
          "details": {
            "type": "Microsoft.Insights/logProfiles",
            "existenceCondition": {
              "allOf": [
                {
                  "not": {
                    "field": "Microsoft.Insights/logProfiles/locations[*]",
                    "notEquals": "eastus"
                  }
                },
                {
                  "not": {
                    "field": "Microsoft.Insights/logProfiles/locations[*]",
                    "notEquals": "westus"
                  }
                },
                {
                  "not": {
                    "field": "Microsoft.Insights/logProfiles/locations[*]",
                    "notEquals": "global"
                  }
                }
              ]
            }
          }
        }
      }
    }
  }

cases:
  - note: audit_if_not_exists_when_host_reports_missing
    resource:
      type: "Microsoft.Resources/subscriptions"
      name: "sub-a"
      properties: {}
    host_await:
      - key:
          operation: "lookup_related_resources"
          type: "Microsoft.Insights/logProfiles"
        response: true
    want_effect: "AuditIfNotExists"

  - note: pass_when_host_reports_exists_and_compliant
    resource:
      type: "Microsoft.Resources/subscriptions"
      name: "sub-b"
      properties: {}
    host_await:
      - key:
          operation: "lookup_related_resources"
          type: "Microsoft.Insights/logProfiles"
        response: false
    want_undefined: true
