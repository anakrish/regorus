# Type Coercion Test Suite
# Tests string↔number coercion, null/undefined handling, and other
# implicit type behaviors documented in semantic-behaviors.md.

cases:
  # =========================================================================
  # String ↔ Number coercion
  # =========================================================================

  - note: coercion_string_number_equals
    policy_rule: |
      {
        "if": {
          "field": "properties.destinationPortRange",
          "equals": 80
        },
        "then": { "effect": "deny" }
      }
    resource:
      properties:
        destinationPortRange: "80"
    want_effect: "deny"

  - note: coercion_number_string_equals
    policy_rule: |
      {
        "if": {
          "field": "properties.port",
          "equals": "443"
        },
        "then": { "effect": "deny" }
      }
    resource:
      properties:
        port: 443
    want_effect: "deny"

  - note: coercion_string_number_greater
    policy_rule: |
      {
        "if": {
          "field": "properties.destinationPortRange",
          "greater": 1024
        },
        "then": { "effect": "deny" }
      }
    resource:
      properties:
        destinationPortRange: "8080"
    want_effect: "deny"

  - note: coercion_string_number_less
    policy_rule: |
      {
        "if": {
          "field": "properties.port",
          "less": 100
        },
        "then": { "effect": "deny" }
      }
    resource:
      properties:
        port: "80"
    want_effect: "deny"

  - note: coercion_in_with_mixed_types
    policy_rule: |
      {
        "if": {
          "field": "properties.destinationPortRange",
          "in": [80, 443, 8080]
        },
        "then": { "effect": "deny" }
      }
    resource:
      properties:
        destinationPortRange: "443"
    want_effect: "deny"

  - note: coercion_non_numeric_string
    policy_rule: |
      {
        "if": {
          "field": "properties.port",
          "equals": 80
        },
        "then": { "effect": "deny" }
      }
    resource:
      properties:
        port: "not-a-number"
    want_undefined: true

  # =========================================================================
  # Null and undefined
  # =========================================================================

  - note: null_field_exists_false
    policy_rule: |
      {
        "if": {
          "field": "properties.optionalField",
          "exists": false
        },
        "then": { "effect": "audit" }
      }
    resource:
      properties: {}
    want_effect: "audit"

  - note: null_field_equals_null
    policy_rule: |
      {
        "if": {
          "field": "properties.nullableField",
          "equals": null
        },
        "then": { "effect": "audit" }
      }
    resource:
      properties:
        nullableField: null
    want_effect: "audit"

  - note: empty_string_not_undefined
    policy_rule: |
      {
        "if": {
          "field": "properties.emptyField",
          "exists": true
        },
        "then": { "effect": "audit" }
      }
    resource:
      properties:
        emptyField: ""
    want_effect: "audit"

  # =========================================================================
  # Boolean semantics
  # =========================================================================

  - note: bool_string_not_equal
    policy_rule: |
      {
        "if": {
          "field": "properties.enabled",
          "equals": true
        },
        "then": { "effect": "audit" }
      }
    resource:
      properties:
        enabled: "true"
    want_undefined: true

  - note: bool_equals_direct
    policy_rule: |
      {
        "if": {
          "field": "properties.httpsOnly",
          "equals": false
        },
        "then": { "effect": "deny" }
      }
    resource:
      properties:
        httpsOnly: false
    want_effect: "deny"

  # =========================================================================
  # Array values in conditions
  # =========================================================================

  - note: array_rhs_in_operator
    policy_rule: |
      {
        "if": {
          "field": "location",
          "in": ["eastus", "westus", "centralus"]
        },
        "then": { "effect": "deny" }
      }
    resource:
      location: "eastus"
    want_effect: "deny"

  - note: array_rhs_from_parameter
    policy_rule: |
      {
        "if": {
          "field": "location",
          "in": "[parameters('allowedLocations')]"
        },
        "then": { "effect": "deny" }
      }
    parameters:
      allowedLocations:
        - "eastus"
        - "westus"
    resource:
      location: "northeurope"
    want_undefined: true

  # =========================================================================
  # Negative numbers in conditions
  # =========================================================================

  - note: negative_number_rhs
    policy_rule: |
      {
        "if": {
          "field": "properties.offset",
          "equals": -10
        },
        "then": { "effect": "audit" }
      }
    resource:
      properties:
        offset: -10
    want_effect: "audit"

  - note: fractional_number_rhs
    policy_rule: |
      {
        "if": {
          "field": "properties.threshold",
          "greater": 0.5
        },
        "then": { "effect": "audit" }
      }
    resource:
      properties:
        threshold: 0.75
    want_effect: "audit"
